# Redis configuration for docker-compose

bind 0.0.0.0
# Listen on all container network interfaces.
# Do not expose port 6379 to the public internet.
protected-mode yes
# Keep protected mode enabled for public examples.
requirepass change_me
# Example password. Replace it before deployment.
port 6379
# Redis port

# Data directory mounted at /data
dir /data
# Data directory
appendonly yes
# Enable AOF persistence
appendfsync everysec
# Sync AOF once per second

logfile ""
# Log to stdout
databases 16
# Number of databases
timeout 0
# Disable idle connection timeout
tcp-keepalive 300
# TCP keepalive interval
