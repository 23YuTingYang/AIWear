version: '3.8'

services:
  yang_wear-mysql:
    container_name: yang_wear-mysql
    image: mysql:8.4.2
    ports:
      - "3307:3306"
    volumes:
      - ../data/yang_wear/mysql/data:/var/lib/mysql
      - ./mysql/init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/sql:/opt/sql
    command: [
      "mysqld",
      "--innodb-buffer-pool-size=80M",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci",
      "--default-time-zone=+8:00",
      "--lower-case-table-names=1",
      "--explicit_defaults_for_timestamp=true",
      "--server-id=1",
      "--log-bin=mysql-bin",
      "--binlog-ignore-db=mysql",
      "--binlog-cache-size=256M",
      "--binlog-format=ROW",
      "--max_connections=2000"
    ]
    restart: always
    networks:
      - yang_wear_network
    healthcheck:
      test: mysql --user=root -h127.0.0.1 --password='change_me' -e "SELECT 1;"
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: change_me
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000

  yang_wear-redis:
    container_name: yang_wear-redis
    image: redis:7.0.15
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf
      - ../data/yang_wear/redis/data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - yang_wear_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "change_me", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  yang_wear-web:
    image: nginx:1.24.0
    container_name: yang_wear-web
    restart: always
    networks:
      - yang_wear_network
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/web/dist:/data/yang_wear/web/dist
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000

networks:
  yang_wear_network:
