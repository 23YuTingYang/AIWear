server:
  port: 8081

spring:
  application:
    name: aiwear-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${AIWEAR_DB_URL:jdbc:mysql://127.0.0.1:3307/aiwear?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8}
    username: ${AIWEAR_DB_USERNAME:change_me}
    password: ${AIWEAR_DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${AIWEAR_REDIS_HOST:127.0.0.1}
      port: ${AIWEAR_REDIS_PORT:6379}
      database: ${AIWEAR_REDIS_DB:0}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  mail:
    host: ${AIWEAR_MAIL_HOST:smtp.example.com}
    port: ${AIWEAR_MAIL_PORT:587}
    username: ${AIWEAR_MAIL_USERNAME:change_me@example.com}
    password: ${AIWEAR_MAIL_PASSWORD:change_me}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${AIWEAR_JWT_SECRET:change_me_to_a_strong_secret}
  expiration: 2

aliyun:
  oss:
    endpoint: ${AIWEAR_OSS_ENDPOINT:oss-cn-example.aliyuncs.com}
    access-key-id: ${AIWEAR_OSS_ACCESS_KEY_ID:change_me}
    access-key-secret: ${AIWEAR_OSS_ACCESS_KEY_SECRET:change_me}
    bucket-name: ${AIWEAR_OSS_BUCKET:change_me}
    max-size: 52428800

python:
  ai:
    base-url: ${AIWEAR_PYTHON_BASE_URL:http://127.0.0.1:6789}

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){cyan} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
